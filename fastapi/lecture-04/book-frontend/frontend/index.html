<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Books</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>Minha Biblioteca</h1>
  </header>

  <main>

    <!-- FORMULÁRIO: chama POST /books -->
    <section class="form-section">
      <h2>Adicionar Livro</h2>
      <form id="book-form">
        <input type="text" id="title" placeholder="Título" required />
        <input type="text" id="author" placeholder="Autor" required />
        <label>
          <input type="checkbox" id="read" />
          Já li
        </label>
        <button type="submit">Adicionar</button>
      </form>
    </section>

    <!-- FILTRO: chama GET /books?read=true ou GET /books -->
    <section class="filter-section">
      <button onclick="loadBooks()">Todos</button>
      <button onclick="loadBooks(true)">Lidos</button>
      <button onclick="loadBooks(false)">Não lidos</button>
    </section>

    <!-- LISTA: onde os livros aparecem -->
    <section id="book-list" class="book-list">
      <p>Carregando livros...</p>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
